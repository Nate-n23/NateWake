name: Build NateWake APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Buildozer components
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install APT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev \
            libssl-dev python3-dev zip unzip git openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libstdc++6 adb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython setuptools virtualenv

      - name: Build Android APK
        run: |
          # Premier run — installe SDK/NDK, va échouer sur les licences
          buildozer android debug || true

          # Accepter toutes les licences une fois le SDK installé
          yes | find $HOME/.buildozer -name "sdkmanager" 2>/dev/null | head -1 | \
            xargs -I{} {} --licenses || true

          # Créer les fichiers de licence manuellement
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

          # Deuxième run — build réel avec licences acceptées
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: natewake-apk
          path: bin/*.apk

      - name: Show logs on failure
        if: failure()
        run: cat $HOME/.buildozer/android/platform/build-*/dists/*/build.log 2>/dev/null || true
